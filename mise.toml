[tools]
bun = "1.3.11"
"npm:oxfmt" = "0.44.0"
"npm:oxlint" = "1.59.0"
"npm:typescript" = "6.0.2"

[tasks.check]
description = "Run format, lint, and typecheck"
depends = ["check:ts", "check:config"]

[tasks."check:ts"]
description = "Run TypeScript format, lint, typecheck, and targeted tests"
depends = ["format", "lint", "typecheck", "test_targeted"]

[tasks."check:config"]
description = "Run checks affected by repo config changes"
depends = ["typecheck", "test_config"]
